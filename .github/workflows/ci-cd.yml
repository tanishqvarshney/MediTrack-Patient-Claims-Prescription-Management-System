name: MediTrack CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository }}/claims-api
  IMAGE_WORKER: ghcr.io/${{ github.repository }}/worker-service
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ─── Backend Tests ─────────────────────────────────────────────────────────
  test-backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: Test@1234!
        ports: ["1433:1433"]
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Test@1234! -Q 'SELECT 1'"
          --health-interval 10s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/packages.lock.json') }}

      - name: Restore dependencies
        run: dotnet restore ./backend/MediTrack.sln

      - name: Build
        run: dotnet build ./backend/MediTrack.sln --no-restore --configuration Release

      - name: Run tests with coverage
        run: |
          dotnet test ./backend/MediTrack.Tests \
            --no-build --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
        env:
          ConnectionStrings__Default: "Server=localhost,1433;Database=MediTrackTest;User=sa;Password=Test@1234!;TrustServerCertificate=True"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─── Frontend Tests ────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Lint
        run: npm run lint
        working-directory: ./frontend

      - name: Unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage
        working-directory: ./frontend

      - name: Build (production)
        run: npm run build -- --configuration production
        working-directory: ./frontend

  # ─── Build & Push Docker Images ────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push — Claims API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/MediTrack.Api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:${{ github.sha }}
            ${{ env.IMAGE_API }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push — Worker Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/MediTrack.Worker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WORKER }}:${{ github.sha }}
            ${{ env.IMAGE_WORKER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push — Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: IMAGE_API,IMAGE_WORKER,IMAGE_FRONTEND
          script: |
            cd /opt/meditrack
            export IMAGE_API=$IMAGE_API
            export IMAGE_WORKER=$IMAGE_WORKER
            export IMAGE_FRONTEND=$IMAGE_FRONTEND
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker system prune -f
            echo "Deployment complete at $(date)"
