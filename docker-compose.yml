version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_PASSWORD:-Dev@1234!}"
      MSSQL_PID: Developer
    volumes:
      - sqldata:/var/opt/mssql
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "timeout 1s bash -c ':> /dev/tcp/127.0.0.1/1433' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass "${REDIS_PASSWORD:-redis_secret}"
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"

  claims-api:
    build:
      context: ./backend
      dockerfile: MediTrack.Api/Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Server=sqlserver;Database=MediTrack;User=sa;Password=${DB_PASSWORD:-Dev@1234!};TrustServerCertificate=True"
      Jwt__Secret: "${JWT_SECRET:-supersecret_change_this_in_production_min32chars!}"
    ports:
      - "5001:8080"

  worker-service:
    build:
      context: ./backend
      dockerfile: MediTrack.Worker/Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Server=sqlserver;Database=MediTrack;User=sa;Password=${DB_PASSWORD:-Dev@1234!};TrustServerCertificate=True"
      Worker__PollingIntervalSeconds: "30"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - claims-api

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - claims-api
      - frontend

volumes:
  sqldata:
  redisdata:
